<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>
  <style>
    body {
      font-family: Arial;
      background: #0b2345;
      color: white;
      padding: 40px 20px;
    }
    
    .signup-container {
      max-width: 400px;
      margin: 50px auto;
      background: #1c3b75;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    
    h1 {
      text-align: center;
      margin-top: 0;
    }
    
    form {
      display: flex;
      flex-direction: column;
    }
    
    label {
      margin-top: 15px;
      font-weight: bold;
    }
    
    input[type="text"],
    input[type="password"] {
      margin-top: 5px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
    }
    
    button {
      margin-top: 20px;
      padding: 12px;
      background: #ffc107;
      color: black;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    button:hover {
      background: #ffcf33;
    }

    .message {
      margin-top: 10px;
      text-align: center;
      font-weight: bold;
      display: none;
      padding: 10px;
      border-radius: 5px;
    }

    .error-message {
      color: #ff6b6b;
      background: rgba(255, 107, 107, 0.2);
    }

    .success-message {
      color: #51cf66;
      background: rgba(81, 207, 102, 0.2);
    }

    .login-link {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
    }

    .login-link a {
      color: #ffc107;
      text-decoration: none;
      font-weight: bold;
    }

    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="signup-container">
  <h1>Sign Up</h1>
  
  <form onsubmit="handleSignup(event)">
    <label>Username:</label>
    <input type="text" id="username"><br>
    
    <label>Password:</label>
    <input type="password" id="password"><br>

    <label>Confirm Password:</label>
    <input type="password" id="confirmPassword"><br>
    
    <div class="message" id="message"></div>
    
    <button type="submit">Sign Up</button>
  </form>

  <div class="login-link">
    Already have an account? <a href="login.html">Login here</a>
  </div>
</div>

<script>
  // Initialize users from localStorage
  function initializeUsers() {
    if (!localStorage.getItem('users')) {
      const demoUsers = {
        users: [
          { username: 'demo', password: 'demo123' },
          { username: 'test', password: 'test123' }
        ]
      };
      localStorage.setItem('users', JSON.stringify(demoUsers));
    }
  }

  initializeUsers();

  function handleSignup(event) {
    event.preventDefault();
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const confirmPassword = document.getElementById('confirmPassword').value.trim();
    const messageDiv = document.getElementById('message');
    
    // Validation
    if (!username || !password || !confirmPassword) {
      showError(messageDiv, 'Please fill in all fields.');
      return;
    }

    if (username.length < 3) {
      showError(messageDiv, 'Username must be at least 3 characters long.');
      return;
    }

    if (password.length < 4) {
      showError(messageDiv, 'Password must be at least 4 characters long.');
      return;
    }

    if (password !== confirmPassword) {
      showError(messageDiv, 'Passwords do not match.');
      return;
    }

    // Get existing users
    const usersData = JSON.parse(localStorage.getItem('users'));
    
    // Check if username already exists
    if (usersData.users.find(u => u.username === username)) {
      showError(messageDiv, 'Username already exists. Please choose another.');
      return;
    }

    // Add new user
    usersData.users.push({ username, password });
    localStorage.setItem('users', JSON.stringify(usersData));

    // Show success message
    showSuccess(messageDiv, 'Account created successfully! Redirecting to login...');
    
    // Redirect to login after 2 seconds
    setTimeout(() => {
      window.location.href = 'login.html';
    }, 2000);
  }

  function showError(messageDiv, message) {
    messageDiv.className = 'message error-message';
    messageDiv.textContent = message;
    messageDiv.style.display = 'block';
  }

  function showSuccess(messageDiv, message) {
    messageDiv.className = 'message success-message';
    messageDiv.textContent = message;
    messageDiv.style.display = 'block';
  }
</script>

</body>
</html>
