<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>
  <style>
    body {
      font-family: Arial;
      background: #0b2345;
      color: white;
      padding: 40px 20px;
    }
    
    .signup-container {
      max-width: 400px;
      margin: 50px auto;
      background: #1c3b75;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    
    h1 {
      text-align: center;
      margin-top: 0;
    }
    
    form {
      display: flex;
      flex-direction: column;
    }
    
    label {
      margin-top: 15px;
      font-weight: bold;
    }
    
    input[type="text"],
    input[type="password"] {
      margin-top: 5px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
    }
    
    button {
      margin-top: 20px;
      padding: 12px;
      background: #ffc107;
      color: black;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    button:hover {
      background: #ffcf33;
    }

    .message {
      margin-top: 10px;
      text-align: center;
      font-weight: bold;
      display: none;
    }

    .error-message {
      color: #ff6b6b;
    }

    .success-message {
      color: #51cf66;
    }

    .login-link {
      text-align: center;
      margin-top: 15px;
    }

    .login-link a {
      color: #ffc107;
      text-decoration: none;
      font-weight: bold;
    }

    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="signup-container">
  <h1>Sign Up</h1>
  
  <form onsubmit="handleSignUp(event)">
    <label>Username:</label>
    <input type="text" id="username"><br>
    
    <label>Password:</label>
    <input type="password" id="password"><br>

    <label>Confirm Password:</label>
    <input type="password" id="confirmPassword"><br>
    
    <div class="message" id="message"></div>
    
    <button type="submit">Sign Up</button>
  </form>

  <div class="login-link">
    Already have an account? <a href="login.html">Login here</a>
  </div>
</div>

<script>
  function handleSignUp(event) {
    event.preventDefault();
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const confirmPassword = document.getElementById('confirmPassword').value.trim();
    const message = document.getElementById('message');
    
    // Validate inputs
    if (!username || !password || !confirmPassword) {
      message.textContent = 'Please fill in all fields';
      message.className = 'message error-message';
      message.style.display = 'block';
      return;
    }

    if (password !== confirmPassword) {
      message.textContent = 'Passwords do not match';
      message.className = 'message error-message';
      message.style.display = 'block';
      return;
    }

    if (password.length < 4) {
      message.textContent = 'Password must be at least 4 characters long';
      message.className = 'message error-message';
      message.style.display = 'block';
      return;
    }
    
    // Create new user object
    const newUser = {
      username: username,
      password: password
    };

    // Send to server or save locally
    fetch('users.json')
      .then(response => response.json())
      .then(data => {
        // Check if username already exists
        const userExists = data.users.find(u => u.username === username);
        
        if (userExists) {
          message.textContent = 'Username already exists. Please choose another.';
          message.className = 'message error-message';
          message.style.display = 'block';
        } else {
          // Add new user to the list
          data.users.push(newUser);
          
          // Note: This will only work with a backend server
          // For now, show success message and redirect to login
          message.textContent = 'Account created successfully! Redirecting to login...';
          message.className = 'message success-message';
          message.style.display = 'block';
          
          // Redirect to login after 2 seconds
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        }
      })
      .catch(error => {
        console.error('Error:', error);
        message.textContent = 'Error creating account. Please try again.';
        message.className = 'message error-message';
        message.style.display = 'block';
      });
  }
</script>

</body>
</html>
