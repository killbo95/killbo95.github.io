<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      font-family: Arial;
      background: #0b2345;
      color: white;
      padding: 40px 20px;
    }
    
    .login-container {
      max-width: 400px;
      margin: 50px auto;
      background: #1c3b75;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    
    h1 {
      text-align: center;
      margin-top: 0;
    }
    
    form {
      display: flex;
      flex-direction: column;
    }
    
    label {
      margin-top: 15px;
      font-weight: bold;
    }
    
    input[type="text"],
    input[type="password"] {
      margin-top: 5px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
    }
    
    button {
      margin-top: 20px;
      padding: 12px;
      background: #ffc107;
      color: black;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    button:hover {
      background: #ffcf33;
    }
  </style>
</head>
<body>

<div class="login-container">
  <h1>Login</h1>
  
  <form onsubmit="handleLogin(event)">
    <label>Username:</label>
    <input type="text" id="username" required><br>
    
    <label>Password:</label>
    <input type="password" id="password" required><br>
    
    <button type="submit">Login</button>
  </form>
</div>

<script>
  function handleLogin(event) {
    event.preventDefault();
    
    const username = document.getElementById('username').value;
    
    // Save username to localStorage
    localStorage.setItem('loggedInUser', username);
    
    // Redirect to index.html
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
