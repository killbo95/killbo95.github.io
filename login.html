<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      font-family: Arial;
      background: #0b2345;
      color: white;
      padding: 40px 20px;
    }
    
    .login-container {
      max-width: 400px;
      margin: 50px auto;
      background: #1c3b75;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
    
    h1 {
      text-align: center;
      margin-top: 0;
    }
    
    form {
      display: flex;
      flex-direction: column;
    }
    
    label {
      margin-top: 15px;
      font-weight: bold;
    }
    
    input[type="text"],
    input[type="password"] {
      margin-top: 5px;
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-size: 14px;
    }
    
    button {
      margin-top: 20px;
      padding: 12px;
      background: #ffc107;
      color: black;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    button:hover {
      background: #ffcf33;
    }

    .error-message {
      color: #ff6b6b;
      margin-top: 10px;
      text-align: center;
      font-weight: bold;
      display: none;
      padding: 10px;
      background: rgba(255, 107, 107, 0.2);
      border-radius: 5px;
    }

    .signup-link {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
    }

    .signup-link a {
      color: #ffc107;
      text-decoration: none;
      font-weight: bold;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="login-container">
  <h1>Login</h1>
  
  <form onsubmit="handleLogin(event)">
    <label>Username:</label>
    <input type="text" id="username"><br>
    
    <label>Password:</label>
    <input type="password" id="password"><br>
    
    <div class="error-message" id="errorMessage"></div>
    
    <button type="submit">Login</button>
  </form>

  <div class="signup-link">
    Don't have an account? <a href="signup.html">Sign up here</a>
  </div>
</div>

<script>
  // Initialize with demo users if no users exist
  function initializeUsers() {
    if (!localStorage.getItem('users')) {
      const demoUsers = {
        users: [
          { username: 'demo', password: 'demo123' },
          { username: 'test', password: 'test123' }
        ]
      };
      localStorage.setItem('users', JSON.stringify(demoUsers));
    }
  }

  // Check if user is already logged in
  function checkIfLoggedIn() {
    const loggedInUser = localStorage.getItem('loggedInUser');
    if (loggedInUser) {
      window.location.href = 'index.html';
    }
  }

  initializeUsers();
  checkIfLoggedIn();

  function handleLogin(event) {
    event.preventDefault();
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorMessage = document.getElementById('errorMessage');
    
    // Validate inputs
    if (!username || !password) {
      errorMessage.textContent = 'No login found please sign in';
      errorMessage.style.display = 'block';
      return;
    }
    
    // Get users from localStorage
    const usersData = JSON.parse(localStorage.getItem('users') || '{"users": []}');
    const user = usersData.users.find(u => u.username === username && u.password === password);
    
    if (!user) {
      errorMessage.textContent = 'Invalid username or password. Please sign up if you don\'t have an account.';
      errorMessage.style.display = 'block';
      return;
    }
    
    // Hide error message and login successful
    errorMessage.style.display = 'none';
    
    // Save username to localStorage with timestamp for session persistence
    localStorage.setItem('loggedInUser', username);
    localStorage.setItem('loginTimestamp', new Date().getTime().toString());
    
    // Redirect to index.html
    window.location.href = 'index.html';
  }
</script>

</body>
</html>
